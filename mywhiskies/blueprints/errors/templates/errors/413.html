{% extends "_base.html" %}

{% block app_content %}
<main class="flex-shrink-0">
  <div class="tp-container">

    <h1 class="tp-title">File Too Large</h1>
    <div class="tp-rule"></div>
    <p class="tp-updated">Error 413</p>

    <div class="tp-body">
      <p>It looks like you tried to upload a file that exceeds the maximum allowed size ({{ config.MAX_UPLOAD_MB }}MB).</p>
      <p>Please resize the image(s) in question and give it another go.</p>
    </div>

    <a href="{{ url_for('bottle.add') }}" class="err-home-link">← Add a Bottle</a>

  </div>
</main>
{% endblock %}
