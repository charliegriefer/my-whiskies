{% macro cancel_button(current_user, request, next_url=None) %}
  {% if next_url %}
    {% set cancel_link = next_url %}
  {% elif request.referrer %}
    {% set cancel_link = request.referrer %}
  {% else %}
    {% set cancel_link = url_for("core.main") %}
  {% endif %}
  <a href="{{ cancel_link }}" class="btn btn-secondary">Cancel</a>
{% endmacro %}
