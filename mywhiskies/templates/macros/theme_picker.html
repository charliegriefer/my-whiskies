{% macro theme_picker() %}
  <div class="navbar-theme-picker d-flex align-items-center gap-2 px-2 py-1 rounded-pill" style="background: var(--surface-2); border: 1px solid var(--border);">
    <span class="navbar-theme-label" aria-hidden="true">THEME</span>
    <button class="theme-swatch" :class="{ 'active-swatch': theme === 'barrel' }"
      style="background: #c87941;" @click="setTheme('barrel')" title="Barrel Room"></button>
    <button class="theme-swatch" :class="{ 'active-swatch': theme === 'cellar' }"
      style="background: #1e3a5f;" @click="setTheme('cellar')" title="Modern Cellar"></button>
    <button class="theme-swatch" :class="{ 'active-swatch': theme === 'vault' }"
      style="background: #c9a84c;" @click="setTheme('vault')" title="The Vault"></button>
  </div>
{% endmacro %}
