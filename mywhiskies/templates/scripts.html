{% filter indent(0, first=False) %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
<script src="https://www.google.com/recaptcha/api.js?render={{ recaptcha_public_key }}"></script>
{% endfilter %}
<script>
  const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]')
  const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl))

  const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
  const tooltipList = [...tooltipTriggerList].map(el => new bootstrap.Tooltip(el))

  // When the browser restores a page from the back/forward cache, any tooltip that was
  // visible before navigation will still be showing. Dismiss them on pageshow.
  window.addEventListener('pageshow', function(e) {
    if (e.persisted) {
      document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function(el) {
        const tt = bootstrap.Tooltip.getInstance(el);
        if (tt) tt.hide();
      });
    }
  });

  // Auto-dismiss flash messages after 5 seconds
  document.querySelectorAll('[data-auto-dismiss]').forEach(el => {
    setTimeout(() => {
      el.classList.remove('show');
      el.addEventListener('transitionend', () => el.remove(), { once: true });
    }, 1500);
  });

  // ABV/Proof display preference
  document.addEventListener('alpine:init', () => {
    Alpine.store('abvDisplay', {
      pref: document.cookie.split('; ').find(r => r.startsWith('abv_display='))?.split('=')[1] || 'abv',
      set(val) {
        this.pref = val;
        document.cookie = 'abv_display=' + val + '; path=/; max-age=31536000';
      }
    });
  });

  // Persist per-page preference in a cookie
  document.addEventListener("change", e => {
    if (e.target.matches("select[name='per_page']"))
      document.cookie = `per_page=${e.target.value}; path=/; max-age=${365 * 24 * 60 * 60}`;
  });

{% if has_captcha %}
  // google recaptcha
  grecaptcha.ready(function() {
    grecaptcha.execute("{{ recaptcha_public_key }}", {action: "submit"}).then(function(token) {
      var recaptchaResponse = document.getElementById("g-recaptcha-response");
      recaptchaResponse.value = token;
    });
  });
{%- endif %}
</script>
