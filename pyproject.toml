[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["migrations/"]

[tool.ruff.lint]
# E = pycodestyle errors
# F = pyflakes
# I = isort
# W = pycodestyle warnings
select = ["E", "F", "I", "W"]

[tool.ruff.lint.isort]
known-first-party = ["mywhiskies"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
